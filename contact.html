<style>
body {
  background: #f8f9fa;
}
.card {
  border-radius: 15px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">Warun Tej Rangu</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
</ul>
</div>
</div>

<!-- CONTACT FORM -->
<div class="container mt-5">

<h3 class="text-center mb-4">Contact Me</h3>

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4">

<form onsubmit="return validate()">

<!-- Name -->
<div class="mb-3">
<label class="form-label"><i class="bi bi-person"></i> Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<!-- Email -->
<div class="mb-3">
<label class="form-label"><i class="bi bi-envelope"></i> Email</label>
<div class="input-group">
<span class="input-group-text">@</span>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>
</div>

<!-- Mobile -->
<div class="mb-3">
<label class="form-label"><i class="bi bi-phone"></i> Mobile Number</label>
<input type="text" id="mobile" class="form-control" placeholder="10 digit number" required>
</div>

<!-- Message -->
<div class="mb-3">
<label class="form-label"><i class="bi bi-chat"></i> Message</label>
<textarea class="form-control" rows="3" placeholder="Write your message..."></textarea>
</div>

<!-- Buttons -->
<div class="d-grid gap-2">
<button class="btn btn-success">
<i class="bi bi-send"></i> Send Message
</button>
<button type="reset" class="btn btn-outline-secondary">Clear</button>
</div>

</form>

</div>
</div>
</div>
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 p-3 bg-dark text-white">
© 2026 Warun Tej Rangu
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Validation -->
<script>
function validate() {
    let mobile = document.getElementById("mobile").value;

    if (mobile.length != 10 || isNaN(mobile)) {
        alert("Enter valid 10 digit mobile number");
        return false;
    }

    alert("Message Sent Successfully!");
    return true;
}
</script>

</body>
</html>
